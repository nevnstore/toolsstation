<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolsStation v0.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Efek Animasi Neon Bergerak untuk Background Utama */
        @keyframes neonGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #050811, #0b1528, #02203c, #050811);
            background-size: 400% 400%;
            animation: neonGradient 15s ease infinite;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container Mockup HP dengan Border Neon Menyala & Bergerak */
        @keyframes neonBorder {
            0% { border-color: #1e293b; box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 10px rgba(0, 210, 255, 0.2); }
            50% { border-color: #00d2ff; box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 25px rgba(0, 210, 255, 0.6); }
            100% { border-color: #1e293b; box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 10px rgba(0, 210, 255, 0.2); }
        }

        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 900px;
            background-color: #050811;
            border: 4px solid #1e293b;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            animation: neonBorder 6s infinite alternate;
        }

        /* --- HALAMAN LOGIN --- */
        .login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 30px;
            text-align: center;
        }

        @keyframes logoPulse {
            0% { filter: drop-shadow(0 0 5px #00d2ff); transform: scale(1); }
            100% { filter: drop-shadow(0 0 20px #00d2ff); transform: scale(1.05); }
        }

        .login-screen i.logo-icon {
            font-size: 50px;
            color: #00d2ff;
            margin-bottom: 15px;
            animation: logoPulse 2s infinite alternate;
        }

        .login-screen h2 {
            font-size: 28px;
            color: #00d2ff;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .login-screen p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            width: 100%;
            margin-bottom: 15px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0052d4, #4364f7, #6fb1fc);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-login:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px rgba(67, 100, 247, 0.4);
        }

        .wa-register {
            margin-top: 40px;
            font-size: 13px;
            color: #94a3b8;
        }

        .wa-register a {
            color: #25d366;
            text-decoration: none;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* --- MAIN APP INTERFACE --- */
        .app-screen {
            display: none; 
            flex-direction: column;
            height: 100%;
        }

        .app-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            background: #070c18;
        }

        .header-icon {
            color: #00d2ff;
            font-size: 20px;
            cursor: pointer;
        }

        .header-title {
            font-size: 18px;
            font-weight: 800;
            color: #00d2ff;
            letter-spacing: 3px;
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.4);
        }

        .app-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .brand-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .brand-logo {
            font-size: 24px;
            font-weight: 900;
            color: #00d2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .brand-subtitle {
            font-size: 11px;
            color: #475569;
            margin-top: 5px;
        }

        /* --- TAMPILAN VIEW HOME --- */
        .home-status-card {
            background: linear-gradient(135deg, #0f172a, #070e1e);
            border: 1px solid #1e293b;
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: inset 0 0 10px rgba(0, 210, 255, 0.05);
        }
        .home-status-card h4 {
            color: #00d2ff;
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .server-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 12px;
        }
        .server-item {
            background: rgba(255,255,255,0.02);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .server-item span {
            color: #64748b;
            display: block;
            font-size: 10px;
        }
        .server-item strong {
            color: #cbd5e1;
        }
        .live-log-box {
            background: #020617;
            border: 1px solid #162a4a;
            border-radius: 10px;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            color: #10b981;
            height: 120px;
            overflow-y: auto;
            line-height: 1.6;
        }

        /* Grid Menu Utama (TOOLS VIEW) */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            margin-bottom: 20px;
        }

        .tool-card {
            background: linear-gradient(145deg, #0a1124, #0f1b35);
            border: 1px solid #162a4a;
            border-radius: 12px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Efek Hover Glowing Neon pada Card */
        .tool-card:hover {
            border-color: #00d2ff;
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .tool-card i {
            font-size: 20px;
            color: #00d2ff;
            background: rgba(0, 212, 255, 0.05);
            padding: 12px;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .tool-card:hover i {
            box-shadow: 0 0 10px #00d2ff;
            background: rgba(0, 212, 255, 0.2);
        }

        .tool-card span {
            font-size: 12px;
            font-weight: 500;
            color: #cbd5e1;
            text-align: center;
        }

        /* --- TAMPILAN VIEW INFO --- */
        .info-container {
            width: 100%;
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 10px;
        }
        .info-table td {
            padding: 12px 8px;
            border-bottom: 1px solid rgba(218, 230, 255, 0.05);
        }
        .info-table td:first-child {
            color: #00d2ff;
            font-weight: 600;
            width: 40%;
        }
        .info-table td:last-child {
            color: #cbd5e1;
            text-align: right;
        }

        /* Bottom Navigation Bar */
        .bottom-nav {
            height: 65px;
            border-top: 1px solid #162a4a;
            background-color: #070c18;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #475569;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            height: 100%;
            justify-content: center;
        }

        .nav-item.active {
            color: #00d2ff;
            text-shadow: 0 0 5px rgba(0, 210, 255, 0.5);
        }

        .nav-item i {
            font-size: 18px;
        }

        /* --- MODAL FITUR INTERAKTIF --- */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 8, 17, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 100;
        }

        .modal-box {
            background: #0f172a;
            border: 1px solid #00d2ff;
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.2);
            max-height: 80%;
            overflow-y: auto;
        }

        .modal-box h3 {
            color: #00d2ff;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-box input, .modal-box select {
            width: 100%;
            padding: 12px;
            background: #050811;
            border: 1px solid #1e293b;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 15px;
            outline: none;
        }

        .modal-box input:focus, .modal-box select:focus {
            border-color: #00d2ff;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .btn-cancel {
            background: #1e293b;
            color: #cbd5e1;
        }

        .btn-confirm {
            background: #00d2ff;
            color: #050811;
        }

        /* Box Output Hasil Fitur */
        .result-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
            line-height: 1.5;
        }

        .result-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
        }

        .result-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
        }

        /* Tampilan Box untuk Akun Gratis */
        .result-free-notice {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 13px;
            line-height: 1.6;
        }

        .btn-buy-vip {
            display: inline-block;
            margin-top: 12px;
            background: #25d366;
            color: #fff;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            transition: 0.2s;
        }
        .btn-buy-vip:hover {
            box-shadow: 0 0 10px rgba(37, 211, 102, 0.5);
        }

        /* --- STYLING KHUSUS GLOBAL CHAT --- */
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 5px;
        }
        .chat-bubble {
            background: #1e293b;
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            max-width: 85%;
        }
        .chat-bubble.me {
            background: rgba(0, 210, 255, 0.15);
            border: 1px solid rgba(0, 210, 255, 0.3);
            align-self: flex-end;
        }
        .chat-bubble .sender {
            font-weight: bold;
            color: #00d2ff;
            margin-bottom: 3px;
            font-size: 11px;
        }

        /* --- STYLING KHUSUS BUG WA (GRID BUTTONS) --- */
        .bug-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }
        .btn-bug {
            background: #050811;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-bug:hover {
            background: #ef4444;
            color: #fff;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        /* Menghilangkan scrollbar default */
        .app-content::-webkit-scrollbar, .chat-container::-webkit-scrollbar {
            width: 0px;
        }
    </style>
</head>
